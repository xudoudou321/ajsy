    // 完整数据包含：新入网回馈(4个档位) + 存量回馈(4个档位) + 新入网终端(5个档位) + 存量终端(4个档位)

    // 显示规则数量
    document.getElementById("ruleCount").innerText = `✅ 已加载 ${ruleCount} 条费用规则（示例数据）`;
    document.getElementById("ruleCount").innerHTML += `<br><span style="color:#999;font-size:10px;">提示：当前仅加载了【新入网回馈：79-89】的示例规则，完整数据需要继续添加</span>`;

    function getVal(id) {
        const el = document.getElementById(id);
        return el ? el.value : "";
    }

    function calculate() {
        const business = getVal("businessType");
        const subCard = getVal("subCard");
        const rongKuan = getVal("rongKuan");
        const yuCun = getVal("yuCun");
        const familyNet = getVal("familyNet");
        const heBao = getVal("heBao");
        const hardware = getVal("hardware");
        const zuWang = getVal("zuWang");
        const biSuan = getVal("biSuan");

        if (!business || !subCard || !rongKuan || !yuCun || !familyNet || !heBao || !hardware || !zuWang || !biSuan) {
            document.getElementById("result").innerHTML = "❌ 请选择所有条件";
            document.getElementById("result").className = "result-value error";
            document.getElementById("resultDetail").innerHTML = "";
            return;
        }

        const key = `${business}|${subCard}|${rongKuan}|${yuCun}|${familyNet}|${heBao}|${hardware}|${zuWang}|${biSuan}`;
        const reward = rules[key];
        const resultEl = document.getElementById("result");
        const detailEl = document.getElementById("resultDetail");

        if (reward !== undefined) {
            resultEl.innerHTML = `💰 ${reward} 元`;
            resultEl.className = "result-value";
            detailEl.innerHTML = `匹配成功：${business}`;
            console.log(`匹配成功: ${key} → ${reward}元`);
        } else {
            resultEl.innerHTML = "❌ 未找到匹配规则";
            resultEl.className = "result-value error";
            detailEl.innerHTML = "请检查条件组合是否正确";
            console.log(`未匹配: ${key}`);
        }
    }

    function resetAll() {
        const ids = ["businessType", "subCard", "rongKuan", "yuCun", "familyNet", "heBao", "hardware", "zuWang", "biSuan"];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = "";
        });
        document.getElementById("result").innerHTML = "-- 元";
        document.getElementById("result").className = "result-value";
        document.getElementById("resultDetail").innerHTML = "";
        console.log("已重置");
    }
</script>
